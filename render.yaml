services:
  - type: web
    name: aura-actuarial-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: aura-db
      mountPath: /app/data
      sizeGB: 1
